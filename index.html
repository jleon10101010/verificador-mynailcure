<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nail Cure - Verificación</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; width: 90%; text-align: center; border-top: 6px solid #0097a7; }
        .logo { max-width: 180px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #0097a7; }
        button { background-color: #ffb74d; color: black; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; transition: 0.3s; }
        button:hover { background-color: #ffa726; }
        #res { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; display: none; font-size: 13px; line-height: 1.4; }
        .footer-icons { margin-top: 20px; font-size: 18px; opacity: 0.5; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://mynailcure.com/wp-content/uploads/2023/10/Logo-ok.jpg" class="logo" alt="My Nail Cure">
        <div style="font-size: 11px; color: #0097a7; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;">Introduce la información de la tapa</div>
        
        <input type="text" id="mfg" placeholder="MFG (dd/mm/aaaa)">
        <input type="text" id="exp" placeholder="EXP (dd/mm/aaaa)">
        <input type="text" id="batch" placeholder="BATCH (12345678-12)">
        
        <button onclick="verificar()">VERIFICAR ORIGINALIDAD</button>
        
        <div id="res"></div>
        
        <div class="footer-icons">♻️ 🐾 🌱 🇪🇺</div>
    </div>

    <script>
        async function verificar() {
            const btn = document.querySelector('button');
            const res = document.getElementById('res');
            const url = "https://script.google.com/macros/s/AKfycbxMTeHvv4y3o_Pg8bdqg_ozlAM_N5P9JRHc0OFfe1VqHlsd7jYo3Fh0WiXh-HZfOjrg/exec"; 
            
            const mfg = document.getElementById('mfg').value.trim();
            const exp = document.getElementById('exp').value.trim();
            const batch = document.getElementById('batch').value.trim();

            if(!mfg || !exp || !batch) {
                alert("Por favor completa todos los campos");
                return;
            }

            btn.innerText = "BUSCANDO...";
            btn.disabled = true;
            res.style.display = "none";

            try {
                const response = await fetch(`${url}?mfg=${encodeURIComponent(mfg)}&exp=${encodeURIComponent(exp)}&batch=${encodeURIComponent(batch)}`);
                const data = await response.json();
                
                res.style.display = "block";
                res.style.backgroundColor = data.status === "success" ? "#e8f5e9" : "#ffebee";
                res.style.color = data.status === "success" ? "#2e7d32" : "#c62828";
                res.style.border = data.status === "success" ? "1px solid #2e7d32" : "1px solid #c62828";
                res.innerHTML = data.message;
            } catch (e) { 
                res.style.display = "block";
                res.style.backgroundColor = "#fff3e0";
                res.style.color = "#e65100";
                res.innerHTML = "⚠️ Error de conexión o datos no encontrados.";
            } finally {
                btn.innerText = "VERIFICAR ORIGINALIDAD";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
